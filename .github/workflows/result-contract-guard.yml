name: Result Contract Guard

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  contract-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine guard scope
        id: scope
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: node stats/validation/scripts/result-contract-guard.mjs scope --manifest stats/validation/result-contract-guard.manifest.json --base "$BASE_SHA" --head "$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Skip when manifest paths are unchanged
        if: steps.scope.outputs.should_run != 'true'
        run: echo "No result-contract-critical files changed."

      - name: Install pnpm
        if: steps.scope.outputs.should_run == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js with pnpm cache
        if: steps.scope.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        if: steps.scope.outputs.should_run == 'true'
        working-directory: ./stats
        run: pnpm install --frozen-lockfile

      - name: Run manifest-defined guard suite
        if: steps.scope.outputs.should_run == 'true'
        run: node stats/validation/scripts/result-contract-guard.mjs run --manifest stats/validation/result-contract-guard.manifest.json
